<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-5M270JVNWC"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-5M270JVNWC');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>보수 언론사 속보 뉴스 큐레이션</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
</head>
<body>

    <!-- 사이드바 -->
    <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h3>📰 검색 및 뉴스 필터</h3>
            <button id="closeSidebarBtn" class="close-btn">&times;</button>
        </div>
        
        <div class="sidebar-content">
            <div class="filter-group">
                <label for="searchInput">🔍 키워드 검색</label>
                <input type="text" id="searchInput" placeholder="예: 국회, 대통령, 부동산, AI...">
            </div>

            <div class="filter-group">
                <label for="mediaSelect">🏢 언론사 선택</label>
                <select id="mediaSelect">
                    <option value="전체">전체</option>
                    <option value="매일신문">매일신문</option>
                    <option value="한미일보">한미일보</option>
                    <option value="프리진뉴스">프리진뉴스</option>
                    <option value="트루스데일리">트루스데일리</option>
                    <option value="펜앤드마이크">펜앤드마이크</option>
                    <option value="독립신문">독립신문</option>
                </select>
            </div>

            <div class="filter-group">
                <label>📊 정렬 방식</label>
                <div class="radio-group">
                    <label><input type="radio" name="sortOrder" value="latest" checked> 최신순 (발행시간)</label>
                    <label><input type="radio" name="sortOrder" value="popular"> 인기순 (조회수)</label>
                </div>
            </div>

            <div class="filter-group">
                <label for="itemsPerPage">📄 페이지당 기사 수</label>
                <select id="itemsPerPage">
                    <option value="20">20개</option>
                    <option value="50" selected>50개 (기본)</option>
                    <option value="100">100개</option>
                    <option value="200">200개</option>
                </select>
            </div>

            <hr class="divider">

            <div id="masterSection">
                <h4>🔑 마스터 로그인</h4>
                <input type="password" id="masterPassword" placeholder="비밀번호 입력">
                <button id="masterLoginBtn" class="btn-primary">로그인</button>
                <p id="masterAuthMsg" class="auth-msg"></p>
            </div>
        </div>
    </aside>

    <!-- 메인 컨테이너 -->
    <main class="main-container">
        <!-- 상단 헤더 툴바 -->
        <header class="top-nav">
            <button id="toggleSidebarBtn" class="toggle-btn" title="사이드바 열기/접기">☰ 메뉴</button>
            <div id="dbStatusBadge" class="status-badge">🟢 DB 정상가동 (최근 96시간 기사)</div>
        </header>

        <!-- 100% 가로 전면 확장 헤더 박스 -->
        <div class="header-box">
            <h1 class="header-title">📰 보수 언론사 속보 뉴스 큐레이션 (최근 96시간)</h1>
            <p class="header-desc">매일신문 · 한미일보 · 프리진뉴스 · 트루스데일리 · 펜앤드마이크 · 독립신문의 최근 96시간 속보 및 원문 링크를 제공합니다.</p>
        </div>

        <!-- 카테고리 탭 -->
        <nav class="category-tabs">
            <button class="tab-btn active" data-category="전체">전체</button>
            <button class="tab-btn" data-category="정치/외교">정치/외교</button>
            <button class="tab-btn" data-category="경제/부동산">경제/부동산</button>
            <button class="tab-btn" data-category="사회/사법">사회/사법</button>
            <button class="tab-btn" data-category="IT/과학">IT/과학</button>
            <button class="tab-btn" data-category="문화/연예/스포츠">문화/연예/스포츠</button>
            <button class="tab-btn" data-category="지역/사설">지역/사설</button>
            <button class="tab-btn" data-category="일반/종합">일반/종합</button>
            <button class="tab-btn" data-category="💡 의견/피드백 보내기">💡 의견/피드백 보내기</button>
        </nav>

        <!-- 기사 통계 안내 -->
        <div id="categoryCaption" class="category-caption"></div>

        <!-- 뉴스 목록 영역 -->
        <section id="newsListContainer" class="news-list-container"></section>

        <!-- 피드백 폼 영역 (의견 보내기 탭 전용) -->
        <section id="feedbackSection" class="feedback-section hidden">
            ### 💡 서비스 피드백 및 의견 보내기
            <p>서비스 관련 버그 신고, 언론사 추가 요청, 개선 제안사항을 남겨주시면 마스터가 확인 후 조치합니다.</p>
            <form id="feedbackForm">
                <div class="form-group">
                    <label for="feedbackType">의견 유형</label>
                    <select id="feedbackType">
                        <option value="버그 신고">버그 신고</option>
                        <option value="기능 제안">기능 제안</option>
                        <option value="언론사 추가 요청">언론사 추가 요청</option>
                        <option value="기타 의견">기타 의견</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="feedbackUser">작성자 (선택)</label>
                    <input type="text" id="feedbackUser" placeholder="성함 또는 닉네임">
                </div>
                <div class="form-group">
                    <label for="feedbackContent">피드백 내용</label>
                    <textarea id="feedbackContent" rows="5" placeholder="내용을 구체적으로 입력해주세요..."></textarea>
                </div>
                <button type="submit" class="btn-submit">의견 제출하기</button>
            </form>
            <div id="feedbackSubmitMsg" class="submit-msg"></div>
        </section>

        <!-- 마스터 피드백 관리 영역 -->
        <section id="masterFeedbackSection" class="master-feedback-section hidden">
            <hr>
            <h3>📋 접수된 피드백 관리 (마스터 전용)</h3>
            <div id="feedbackList"></div>
        </section>

        <!-- 순수 미니멀 텍스트 페이지네이션 영역 (버튼 외곽선 박스 100% 없음) -->
        <footer id="paginationContainer" class="pagination-container"></footer>
    </main>

    <script src="app.js"></script>
</body>
</html>
